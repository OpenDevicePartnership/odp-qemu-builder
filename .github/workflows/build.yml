name: Build QEMU

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BUILDER_IMAGE_REF: ${{ github.repository }}/builder
  QEMU_BRANCH: "v10.0.0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (binfmt)
        uses: docker/setup-qemu-action@v3

      - name: Restore QEMU source cache
        uses: actions/cache@v4
        with:
          path: .cache/qemu-src
          key: qemu-src-${{ env.QEMU_BRANCH }}-${{ hashFiles('qemu-sbsa-patch.patch') }}

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: .cache/build-${{ matrix.arch }}
          key: build-${{ matrix.arch }}-${{ env.QEMU_BRANCH }}-${{ hashFiles('Dockerfile', 'build-in-docker.sh') }}

      - name: Restore ccache cache
        uses: actions/cache@v4
        with:
          path: .cache/ccache-${{ matrix.arch }}
          key: ccache-${{ matrix.arch }}-${{ env.QEMU_BRANCH }}-${{ hashFiles('Dockerfile', 'build-in-docker.sh', 'qemu-sbsa-patch.patch') }}
          restore-keys: |
            ccache-${{ matrix.arch }}-${{ env.QEMU_BRANCH }}-

      - name: Build QEMU (${{ matrix.arch }})
        run: ./build.sh ${{ matrix.arch }}

      - name: Create tarball
        run: |
          tar czf "qemu-${{ matrix.arch }}.tar.gz" \
            -C .cache/output-${{ matrix.arch }}/usr/local .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ matrix.arch }}
          path: qemu-${{ matrix.arch }}.tar.gz

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && matrix.arch == 'amd64'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push builder image
        if: github.event_name != 'pull_request' && matrix.arch == 'amd64'
        run: |
          docker tag qemu-builder:local "${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_REF }}:latest"
          docker push "${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_REF }}:latest"
