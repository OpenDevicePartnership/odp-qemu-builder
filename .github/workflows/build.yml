name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/qemu

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (binfmt for cross-platform docker run)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute platform tag
        id: ptag
        run: echo "tag=$(echo '${{ matrix.platform }}' | sed 's|/|-|g')" >> "$GITHUB_OUTPUT"

      - name: Build (load locally, single platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: local/qemu-builder:${{ steps.ptag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — qemu-system-aarch64 --version
        run: |
          docker run --rm --platform=${{ matrix.platform }} \
            local/qemu-builder:${{ steps.ptag.outputs.tag }} \
            qemu-system-aarch64 --version | tee /dev/stderr | grep -q '10\.0\.0'

      - name: Smoke test — qemu-system-riscv32 --version
        run: |
          docker run --rm --platform=${{ matrix.platform }} \
            local/qemu-builder:${{ steps.ptag.outputs.tag }} \
            qemu-system-riscv32 --version | tee /dev/stderr | grep -q '10\.0\.0'

      - name: IMG-03 — riscv32 firmware blob present (amd64 only)
        if: matrix.platform == 'linux/amd64'
        run: |
          docker run --rm local/qemu-builder:${{ steps.ptag.outputs.tag }} \
            ls -l /usr/local/share/qemu/opensbi-riscv32-generic-fw_dynamic.bin

      - name: Summary
        run: |
          echo "::notice::Smoke tests passed for ${{ matrix.platform }} — qemu-system-aarch64 + qemu-system-riscv32 v10.0.0"

  push:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (multi-arch, cache-only)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
